<!DOCTYPE html>
<!--
  Preview for nemo2_spiderlein_gsorted.html
  Mimics the bwhpc.de/software.php Bootstrap Table layout.
  Served together with the main web interface.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>bwForCluster NEMO 2 – Software List</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://unpkg.com/bootstrap-table@1.22.5/dist/bootstrap-table.min.css">
  <style>
    body { padding: 1.5rem; background: #f8f9fa; }
    h2   { margin-bottom: 1rem; }
    #meta { font-size: .85rem; color: #6c757d; margin-bottom: 1rem; }
    .fixed-table-container { font-size: .9rem; }
  </style>
</head>
<body>

<div class="container-fluid">
  <h2>bwForCluster NEMO 2 – Software List
    <small class="text-muted fs-6">(nemo2_spiderlein_gsorted.html)</small>
  </h2>
  <p><a href="index.html">&larr; Back to module browser</a></p>
  <div id="meta">Loading …</div>

  <table id="table">
    <thead>
      <tr>
        <th data-field="name" data-sortable="true" data-filter-control="input">Software</th>
        <th data-field="vers" data-sortable="true" data-filter-control="input">Version</th>
        <th data-field="cate" data-sortable="true" data-filter-control="select">Category</th>
        <th data-field="elig" data-sortable="true" data-filter-control="select">Eligible</th>
        <th data-field="clus" data-sortable="true" data-filter-control="select">Cluster</th>
        <th data-field="what" data-sortable="true" data-filter-control="input">Description</th>
        <th data-field="vari" data-sortable="true" data-filter-control="input">Variants</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/bootstrap-table@1.22.5/dist/bootstrap-table.min.js"></script>
<script src="https://unpkg.com/bootstrap-table@1.22.5/dist/extensions/filter-control/bootstrap-table-filter-control.min.js"></script>

<script>
(async function () {
  const DATAFILE = './nemo2_spiderlein_gsorted.html';

  let text;
  try {
    const r = await fetch(DATAFILE);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    text = await r.text();
  } catch (e) {
    document.getElementById('meta').textContent =
      '⚠ Could not load ' + DATAFILE + ': ' + e.message;
    return;
  }

  // Extract metadata from HTML comments
  const dateLine = (text.match(/<!--Date:\s*(\S+)-->/) || [])[1] || '';
  const srcLine  = (text.match(/<!--Source:\s*(.+?)-->/) || [])[1] || '';

  // Parse <tr> rows into a data array for Bootstrap Table.
  // Raw <tr> injection is not used because bootstrapTable() clears the tbody on init.
  const parser = new DOMParser();
  const doc = parser.parseFromString('<table>' + text + '</table>', 'text/html');
  const data = [];
  doc.querySelectorAll('tr').forEach(function (r) {
    var cells = r.querySelectorAll('td');
    if (cells.length >= 7) {
      data.push({
        name: cells[0].textContent.trim(),
        vers: cells[1].textContent.trim(),
        cate: cells[2].textContent.trim(),
        elig: cells[3].textContent.trim(),
        clus: cells[4].textContent.trim(),
        what: cells[5].textContent.trim(),
        vari: cells[6].textContent.trim()
      });
    }
  });

  // Init Bootstrap Table with data array — no data-toggle on the <table>
  // to avoid auto-init race (auto-init would run before async fetch finishes).
  $('#table').bootstrapTable({
    data: data,
    filterControl: true,
    showSearchClearButton: true,
    pagination: true,
    pageSize: 50,
    pageList: [25, 50, 100, 200, 'All'],
    sortable: true,
    showColumns: true,
    stickyHeader: true
  });

  document.getElementById('meta').textContent =
    'Source: ' + srcLine + '  |  Date: ' + dateLine + '  |  Rows: ' + data.length;
})();
</script>
</body>
</html>
